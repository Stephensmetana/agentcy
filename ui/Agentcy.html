<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agentcy</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --user: #3fb950;
    --danger: #f85149;
  }
  html, body, #root { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; line-height: 1.6; }
  * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  *::-webkit-scrollbar { width: 6px; height: 6px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  select { appearance: none; -webkit-appearance: none; }
  button, input, textarea, select { font-family: inherit; }
  a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="/agentcy-shared.jsx"></script>
<script type="text/babel" src="/agentcy-chat.jsx"></script>
<script type="text/babel" src="/agentcy-tasks-settings.jsx"></script>

<script type="text/babel">
// ─── Router ────────────────────────────────────────────────────────────────

function parseHash(hash) {
  const h = hash.replace(/^#/, '') || '/channel/general';
  if (h === '/' || h === '') return { view: 'channel', param: 'general' };
  const [, seg1, seg2] = h.split('/');
  if (seg1 === 'channel') return { view: 'channel', param: seg2 || 'general' };
  if (seg1 === 'tasks' && !seg2) return { view: 'tasks', param: null };
  if (seg1 === 'tasks' && /^\d+$/.test(seg2)) return { view: 'task-detail', param: seg2 };
  if (seg1 === 'tasks') return { view: 'tasks', param: null };
  if (seg1 === 'settings' && !seg2) return { view: 'settings', param: null };
  if (seg1 === 'settings' && seg2) return { view: 'settings-' + seg2, param: null };
  if (seg1 === 'logs') return { view: 'logs', param: null };
  return { view: 'channel', param: 'general' };
}

function parseQuery(hash) {
  const idx = hash.indexOf('?');
  if (idx === -1) return {};
  const qs = hash.slice(idx + 1);
  return Object.fromEntries(qs.split('&').map(p => p.split('=')));
}

// ─── TopNav ────────────────────────────────────────────────────────────────

function TopNav({ navigate, view, lastChannel }) {
  const links = [
    { label: 'Agentcy', path: '/channel/' + (lastChannel || 'general'), key: 'channel' },
    { label: 'Tasks',   path: '/tasks',           key: 'tasks' },
    { label: 'Agents',  path: '/settings/agents', key: 'settings-agents' },
    { label: 'Logs',    path: '/logs',            key: 'logs' },
    { label: 'Settings',path: '/settings',        key: 'settings' },
  ];
  const active = view === 'channel' ? 'channel'
    : view === 'tasks' || view === 'task-detail' ? 'tasks'
    : view.startsWith('settings') ? (view === 'settings-agents' ? 'settings-agents' : 'settings')
    : view;
  return (
    <div style={{ height:40, minHeight:40, background:'var(--surface)', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', padding:'0 14px', gap:2, flexShrink:0, zIndex:10 }}>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style={{marginRight:6,flexShrink:0}}>
        <circle cx="12" cy="12" r="10" fill="#58a6ff" opacity="0.18"/>
        <circle cx="12" cy="12" r="5" fill="#58a6ff"/>
      </svg>
      {links.map(l => (
        <button key={l.key} onClick={() => navigate(l.path)} style={{
          background: active===l.key ? 'rgba(88,166,255,.15)' : 'transparent',
          border: 'none', color: active===l.key ? 'var(--accent)' : 'var(--muted)',
          cursor: 'pointer', borderRadius:6, padding:'4px 12px', fontSize:13,
          fontWeight: active===l.key ? 600 : 400, transition:'all 0.15s',
        }}>{l.label}</button>
      ))}
    </div>
  );
}

// ─── App ───────────────────────────────────────────────────────────────────

function App() {
  const [channels,  setChannels]  = React.useState([]);
  const [agents,    setAgents]    = React.useState([]);
  const [roles,     setRoles]     = React.useState([]);
  const [messages,  setMessages]  = React.useState({});
  const [tasks,     setTasks]     = React.useState([]);
  const [heartbeatTimeout, setHeartbeatTimeout] = React.useState(15);
  const [route,     setRoute]     = React.useState(() => parseHash(window.location.hash));
  const [query,     setQuery]     = React.useState(() => parseQuery(window.location.hash));
  const [lastChannel, setLastChannel] = React.useState('general');
  const wsRef = React.useRef(null);

  // ── Boot: load all initial data ────────────────────────────────────────────
  React.useEffect(() => {
    Promise.all([
      API.get('/api/channels'),
      API.get('/api/agents'),
      API.get('/api/roles'),
      API.get('/api/tasks'),
    ]).then(([chs, ags, rls, tks]) => {
      const normChannels = chs.map(norm.channel);
      setChannels(normChannels);
      setAgents(ags.map(norm.agent));
      setRoles(rls.map(norm.role));
      setTasks(tks.map(norm.task));
      // Navigate to first channel if no hash is set
      if (!window.location.hash || window.location.hash === '#' || window.location.hash === '#/') {
        if (normChannels.length) window.location.hash = '/channel/' + normChannels[0].id;
      }
    }).catch(console.error);
  }, []);

  // ── Hash routing ───────────────────────────────────────────────────────────
  React.useEffect(() => {
    const onHashChange = () => {
      setRoute(parseHash(window.location.hash));
      setQuery(parseQuery(window.location.hash));
    };
    window.addEventListener('hashchange', onHashChange);
    return () => window.removeEventListener('hashchange', onHashChange);
  }, []);

  const navigate = (path) => { window.location.hash = path; };

  React.useEffect(() => {
    if (route.view === 'channel') setLastChannel(route.param || 'general');
  }, [route]);

  // ── Load messages when channel changes ────────────────────────────────────
  React.useEffect(() => {
    if (route.view !== 'channel') return;
    const chName = route.param || 'general';
    API.get(`/api/messages?channel=${encodeURIComponent(chName)}`)
      .then(msgs => setMessages(prev => ({ ...prev, [chName]: msgs.map(norm.msg) })))
      .catch(console.error);
  }, [route.view, route.param]);

  // ── WebSocket: real-time messages ─────────────────────────────────────────
  React.useEffect(() => {
    if (route.view !== 'channel') {
      if (wsRef.current) { try { wsRef.current.close(); } catch {} wsRef.current = null; }
      return;
    }
    const chName = route.param || 'general';
    let dead = false;

    function connect() {
      if (dead) return;
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const ws = new WebSocket(`${proto}://${location.host}/ws/${encodeURIComponent(chName)}`);
      wsRef.current = ws;
      ws.onmessage = (e) => {
        try {
          const p = JSON.parse(e.data);
          if (p.type === 'message' && p.data.channel === chName) {
            const m = norm.msg(p.data);
            setMessages(prev => {
              const arr = prev[chName] || [];
              if (arr.find(x => x.id === m.id)) return prev;
              return { ...prev, [chName]: [...arr, m] };
            });
          }
        } catch {}
      };
      ws.onclose = () => { if (!dead) setTimeout(connect, 3000); };
    }

    connect();
    return () => {
      dead = true;
      if (wsRef.current) { try { wsRef.current.close(); } catch {} wsRef.current = null; }
    };
  }, [route.view, route.param]);

  // ── Handlers ──────────────────────────────────────────────────────────────

  const handleSelectChannel = (id) => navigate('/channel/' + id);

  const handleSend = async (body) => {
    const chName = route.param || 'general';
    try {
      const msg = await API.post('/api/messages', { content: body, channel: chName });
      const m = norm.msg(msg);
      setMessages(prev => {
        const arr = prev[chName] || [];
        if (arr.find(x => x.id === m.id)) return prev;
        return { ...prev, [chName]: [...arr, m] };
      });
    } catch (e) { console.error('Send failed:', e); }
  };

  const handleAddChannel = async (name) => {
    try {
      const ch = await API.post('/api/channels', { name });
      const nch = norm.channel(ch);
      setChannels(prev => [...prev, nch]);
      navigate('/channel/' + nch.id);
    } catch (e) { console.error('Add channel failed:', e); }
  };

  const handleRenameChannel = async (id, newName) => {
    const ch = channels.find(c => c.id === id);
    if (!ch) return;
    try {
      const updated = await API.patch(`/api/channels/${ch._numId}`, { name: newName });
      setChannels(prev => prev.map(c => c.id === id ? norm.channel(updated) : c));
    } catch (e) { console.error('Rename channel failed:', e); }
  };

  const handleDeleteChannel = async (id) => {
    const ch = channels.find(c => c.id === id);
    if (!ch) return;
    try {
      await API.del(`/api/channels/${ch._numId}`);
      const remaining = channels.filter(c => c.id !== id);
      setChannels(remaining);
      if (route.param === id) navigate('/channel/' + (remaining[0]?.id || 'general'));
    } catch (e) { console.error('Delete channel failed:', e); }
  };

  const handleNewTask = async (form) => {
    try {
      const t = await API.post('/api/tasks', {
        title: form.title,
        description: form.description || '',
        channel: form.channel,
        status: 'todo',
      });
      setTasks(prev => [...prev, norm.task(t)]);
    } catch (e) { console.error('Create task failed:', e); }
  };

  const handleUpdateTask = async (updated) => {
    try {
      const t = await API.patch(`/api/tasks/${updated.id}`, {
        title: updated.title,
        description: updated.description,
        status: updated.status.replace(/_/g, '-'),
        channel: updated.channel,
      });
      // Preserve local-only fields (priority, labels, comments) while updating API fields.
      setTasks(prev => prev.map(x => x.id === updated.id ? { ...updated, ...norm.task(t) } : x));
    } catch (e) { console.error('Update task failed:', e); }
  };

  const handleDeleteTask = async (id) => {
    try {
      await API.del(`/api/tasks/${id}`);
      setTasks(prev => prev.filter(t => t.id !== id));
      navigate('/tasks');
    } catch (e) { console.error('Delete task failed:', e); }
  };

  const handleKillAgent = async (id) => {
    try {
      await API.del(`/api/agents/${encodeURIComponent(id)}/kill`).catch(() => {});
      await API.del(`/api/agents/${encodeURIComponent(id)}`);
      setAgents(prev => prev.filter(a => a.id !== id));
    } catch (e) { console.error('Kill agent failed:', e); }
  };

  const handleSpawnAgent = async (form) => {
    const body = { type: form.type, role: form.role || 'developer', channel: form.channel || 'general' };
    if (form.type === 'claude')  { body.model = form.model || 'claude-haiku-4-5-20251001'; body.interval = form.interval || 5; }
    if (form.type === 'ollama')  { body.model = form.model; body.ollama_url = form.url; body.interval = form.interval || 5; }
    if (form.type === 'custom')  { body.command = form.command; }
    try {
      await API.post('/api/agents/spawn', body);
      const ags = await API.get('/api/agents');
      setAgents(ags.map(norm.agent));
    } catch (e) { console.error('Spawn failed:', e); }
  };

  const handleUpdateAgent = async (agent) => {
    try {
      const updated = await API.patch(`/api/agents/${encodeURIComponent(agent.id)}`, {
        role: agent.role,
        channel: agent.channel,
      });
      setAgents(prev => prev.map(a => a.id === agent.id ? norm.agent(updated) : a));
    } catch (e) { console.error('Update agent failed:', e); }
  };

  const handleSaveRole = async (role) => {
    const rulesArr = (role.rules || '').split('\n').filter(Boolean);
    try {
      if (roles.find(r => r.name === role.name)) {
        await API.put(`/api/roles/${encodeURIComponent(role.name)}`, { description: role.description, rules: rulesArr });
      } else {
        await API.post('/api/roles', { name: role.name, description: role.description, rules: rulesArr });
      }
      const rls = await API.get('/api/roles');
      setRoles(rls.map(norm.role));
    } catch (e) { console.error('Save role failed:', e); }
  };

  const handleDeleteRole = async (id) => {
    const role = roles.find(r => r.id === id);
    if (!role) return;
    try {
      await API.del(`/api/roles/${encodeURIComponent(role.name)}`);
      setRoles(prev => prev.filter(r => r.id !== id));
    } catch (e) { console.error('Delete role failed:', e); }
  };

  // ── Render ─────────────────────────────────────────────────────────────────

  const { view, param } = route;
  const channelFilter = query.channel || null;

  const renderView = () => {
    switch (view) {
      case 'channel':
        return (
          <ChatView
            channels={channels}
            activeChannelId={param || (channels[0]?.id || 'general')}
            messages={messages}
            tasks={tasks}
            agents={agents}
            onSend={handleSend}
            onAddChannel={handleAddChannel}
            onRenameChannel={handleRenameChannel}
            onDeleteChannel={handleDeleteChannel}
            onSelectChannel={handleSelectChannel}
            navigate={navigate}
          />
        );
      case 'tasks':
        return (
          <TasksBoard
            tasks={tasks}
            channels={channels}
            navigate={navigate}
            lastChannel={lastChannel}
            channelFilter={channelFilter}
            onNewTask={handleNewTask}
          />
        );
      case 'task-detail':
        return (
          <TaskDetail
            taskId={param}
            tasks={tasks}
            channels={channels}
            navigate={navigate}
            lastChannel={lastChannel}
            onUpdateTask={handleUpdateTask}
            onDeleteTask={handleDeleteTask}
          />
        );
      case 'settings':
        return <SettingsHub navigate={navigate} lastChannel={lastChannel} />;
      case 'settings-agents':
        return (
          <SettingsAgents
            agents={agents}
            roles={roles}
            channels={channels}
            navigate={navigate}
            lastChannel={lastChannel}
            onKillAgent={handleKillAgent}
            onSpawnAgent={handleSpawnAgent}
            onUpdateAgent={handleUpdateAgent}
            onSaveTimeout={setHeartbeatTimeout}
            heartbeatTimeout={heartbeatTimeout}
          />
        );
      case 'settings-roles':
        return (
          <SettingsRoles
            roles={roles}
            agents={agents}
            navigate={navigate}
            lastChannel={lastChannel}
            onSaveRole={handleSaveRole}
            onDeleteRole={handleDeleteRole}
          />
        );
      case 'settings-export':
        return (
          <SettingsExport
            channels={channels}
            messages={messages}
            navigate={navigate}
            lastChannel={lastChannel}
          />
        );
      case 'logs':
        return (
          <LogsView
            agents={agents}
            navigate={navigate}
            lastChannel={lastChannel}
          />
        );
      default:
        return <div style={{ color:'var(--muted)', padding:40 }}>404 — Page not found</div>;
    }
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>
      <TopNav navigate={navigate} view={view} lastChannel={lastChannel} />
      <div style={{ flex:1, overflow:'hidden', display:'flex', flexDirection:'column' }}>
        {renderView()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
